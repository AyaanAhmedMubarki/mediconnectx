<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medical History – MediConnectX Patient</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { font-family: "Segoe UI", sans-serif; margin: 0; background-color: #f4f9f9; color: #333; }

    /* ── Navbar ── */
    .navbar {
      background-color: #003d3d; padding: 1rem 1.5rem;
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; position: sticky; top: 0; z-index: 1000;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    .logo { color: #fff; font-size: 1.4rem; font-weight: 700; white-space: nowrap; letter-spacing: 0.01em; }
    .hamburger { display: none; background: none; border: none; color: #fff; font-size: 1.8rem; cursor: pointer; padding: 0; line-height: 1; }
    .nav-links { list-style: none; display: flex; gap: 0.25rem; align-items: center; }
    .nav-links a { color: rgba(255,255,255,0.88); text-decoration: none; font-size: 0.95rem; padding: 6px 15px; border-radius: 20px; transition: background 0.2s, color 0.2s; white-space: nowrap; letter-spacing: 0.02em; }
    .nav-links a:hover { background: rgba(255,255,255,0.15); color: #fff; }
    .nav-links a.nav-active { background: rgba(255,255,255,0.28); color: #fff; font-weight: 600; }
    @media(max-width:768px){
      .logo{font-size:1.1rem;} .hamburger{display:block;}
      .navbar nav{position:absolute;top:100%;left:0;width:100%;z-index:99;}
      .nav-links{display:none;flex-direction:column;background:#003d3d;padding:0.8rem 1.5rem;gap:0;box-shadow:0 4px 8px rgba(0,0,0,0.3);}
      .nav-links.open{display:flex;}
      .nav-links li{border-bottom:1px solid rgba(255,255,255,0.1);}
      .nav-links li:last-child{border-bottom:none;}
      .nav-links a{display:block;padding:0.65rem 0;}
      .page-header h1{font-size:1.7rem;}
      .page-header{padding:36px 16px;}
    }

    /* ── Page header ── */
    .page-header {
      background: linear-gradient(to right, rgba(0,102,102,0.85), rgba(0,51,51,0.85)),
        url("images/MainPageImage.jpg") center/cover;
      color: white; text-align: center; padding: 50px 20px;
    }
    .page-header h1 { font-size: 2.4rem; font-weight: 700; margin-bottom: 10px; }
    .page-header p { font-size: 1.05rem; font-weight: 300; }

    .main-wrap { max-width: 1100px; margin: 0 auto; padding: 28px 16px 60px; }

    /* ── Section titles ── */
    .sec-title { font-size: 1.25rem; font-weight: 700; color: #003d3d; margin-bottom: 18px; border-left: 4px solid #00b3b3; padding-left: 12px; }

    /* ── Record card ── */
    .record-card {
      background: #fff; border-radius: 12px; box-shadow: 0 4px 14px rgba(0,0,0,0.1);
      padding: 20px; margin-bottom: 16px; border-left: 4px solid #00b3b3;
    }
    .record-card h5 { color: #003d3d; margin-bottom: 12px; font-weight: 700; font-size: 1rem; }
    .record-card .record-meta { font-size: 0.85rem; color: #666; margin-bottom: 14px; }
    .record-field { margin-bottom: 12px; }
    .record-field strong { display: block; color: #003d3d; font-size: 0.9rem; margin-bottom: 4px; }
    .record-field p { margin: 0; color: #555; padding: 8px 12px; background: #f0f8f8; border-radius: 6px; font-size: 0.95rem; }

    .no-records {
      text-align: center; color: #888; padding: 48px 16px;
      font-style: italic; background: #fff; border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07); font-size: 0.95rem;
    }

    footer { background-color: #003d3d; color: #fff; text-align: center; padding: 18px; margin-top: 40px; }
  </style>
</head>
<body>

  <div id="navbar-root"></div>
  <script src="navbar.js"></script>

  <div class="page-header">
    <h1>Medical History</h1>
    <p>Your medical records and consultation history.</p>
  </div>

  <div class="main-wrap">
    <p class="sec-title"><i class="bi bi-file-medical me-2"></i>Your Medical Records</p>

    <div id="recordsContainer">
      <div class="no-records">
        <i class="bi bi-inbox" style="font-size: 2.5rem; color: #bbb; display: block; margin-bottom: 10px;"></i>
        No medical records found. Records will appear here after your consultations.
      </div>
    </div>
  </div>

  <footer><p>© 2026 MediConnectX – Your Health, Our Priority</p></footer>

  <script src="api.js"></script>
  <script src="customModal.js"></script>
  <script>
    const auth = requireAuth('PATIENT');

    async function loadMedicalHistory() {
      try {
        const response = await fetch(`http://localhost:8080/api/medical-records/patient/${auth.roleId}`, {
          headers: authHeaders()
        });

        if (!response.ok) {
          console.error('API Error:', response.status, response.statusText);
          if (response.status === 401) {
            showAlert('Error', 'Unauthorized - Please login again');
            window.location.href = 'Login.html';
            return;
          }
          throw new Error(`API Error: ${response.status}`);
        }

        const records = await response.json();

        if (!records || records.length === 0) {
          return;
        }

        const html = records.map(record => {
          const aptDate = record.appointment?.appointmentTime
            ? new Date(record.appointment.appointmentTime).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })
            : 'N/A';

          const doctorName = record.appointment?.doctor?.name || 'Dr. Unknown';

          return `
            <div class="record-card">
              <h5>Consultation with ${doctorName}</h5>
              <div class="record-meta">
                <i class="bi bi-calendar3"></i> ${aptDate}
              </div>

              <div class="record-field">
                <strong><i class="bi bi-stethoscope"></i> Diagnosis</strong>
                <p>${record.diagnosis || 'Not recorded'}</p>
              </div>

              <div class="record-field">
                <strong><i class="bi bi-chat-quote"></i> Doctor's Notes</strong>
                <p>${record.notes || 'No notes'}</p>
              </div>

              <div class="record-field">
                <strong><i class="bi bi-eye"></i> Observations</strong>
                <p>${record.observations || 'No observations'}</p>
              </div>

              <div style="font-size: 0.8rem; color: #999; margin-top: 12px;">
                Created: ${new Date(record.createdAt).toLocaleString('en-IN')}
              </div>
            </div>
          `;
        }).join('');

        document.getElementById('recordsContainer').innerHTML = html;
      } catch (error) {
        console.error('Error loading medical history:', error);
        showAlert('Error', `Failed to load medical history: ${error.message}`);
      }
    }

    document.addEventListener('DOMContentLoaded', loadMedicalHistory);
  </script>
</body>
</html>
