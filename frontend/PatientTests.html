<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Medical Tests – MediConnectX Patient</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { font-family: "Segoe UI", sans-serif; margin: 0; background-color: #f4f9f9; color: #333; }

    /* ── Navbar ── */
    .navbar {
      background-color: #003d3d; padding: 1rem 1.5rem;
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; position: sticky; top: 0; z-index: 1000;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2);
    }
    .logo { color: #fff; font-size: 1.4rem; font-weight: 700; white-space: nowrap; letter-spacing: 0.01em; }
    .hamburger { display: none; background: none; border: none; color: #fff; font-size: 1.8rem; cursor: pointer; padding: 0; line-height: 1; }
    .nav-links { list-style: none; display: flex; gap: 0.25rem; align-items: center; }
    .nav-links a { color: rgba(255,255,255,0.88); text-decoration: none; font-size: 0.95rem; padding: 6px 15px; border-radius: 20px; transition: background 0.2s, color 0.2s; white-space: nowrap; letter-spacing: 0.02em; }
    .nav-links a:hover { background: rgba(255,255,255,0.15); color: #fff; }
    .nav-links a.nav-active { background: rgba(255,255,255,0.28); color: #fff; font-weight: 600; }
    @media(max-width:768px){
      .logo{font-size:1.1rem;} .hamburger{display:block;}
      .navbar nav{position:absolute;top:100%;left:0;width:100%;z-index:99;}
      .nav-links{display:none;flex-direction:column;background:#003d3d;padding:0.8rem 1.5rem;gap:0;box-shadow:0 4px 8px rgba(0,0,0,0.3);}
      .nav-links.open{display:flex;}
      .nav-links li{border-bottom:1px solid rgba(255,255,255,0.1);}
      .nav-links li:last-child{border-bottom:none;}
      .nav-links a{display:block;padding:0.65rem 0;}
      .page-header h1{font-size:1.7rem;}
      .page-header{padding:36px 16px;}
    }

    /* ── Page header ── */
    .page-header {
      background: linear-gradient(to right, rgba(0,102,102,0.85), rgba(0,51,51,0.85)),
        url("images/MainPageImage.jpg") center/cover;
      color: white; text-align: center; padding: 50px 20px;
    }
    .page-header h1 { font-size: 2.4rem; font-weight: 700; margin-bottom: 10px; }
    .page-header p { font-size: 1.05rem; font-weight: 300; }

    .main-wrap { max-width: 1100px; margin: 0 auto; padding: 28px 16px 60px; }

    /* ── Section titles ── */
    .sec-title { font-size: 1.25rem; font-weight: 700; color: #003d3d; margin-bottom: 18px; border-left: 4px solid #00b3b3; padding-left: 12px; }

    /* ── Filter buttons ── */
    .filter-bar {
      background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.09);
      padding: 14px 16px; margin-bottom: 20px; display: flex; gap: 8px; flex-wrap: wrap;
    }
    .filter-btn {
      padding: 7px 16px; border: 2px solid #c8e8e8; border-radius: 8px;
      background: #fff; color: #003d3d; cursor: pointer; font-size: 0.85rem;
      font-weight: 600; transition: all 0.2s;
    }
    .filter-btn:hover { border-color: #00b3b3; color: #00b3b3; }
    .filter-btn.active { background: #006666; border-color: #006666; color: #fff; }

    /* ── Test card ── */
    .test-card {
      background: #fff; border-radius: 12px; box-shadow: 0 4px 14px rgba(0,0,0,0.1);
      padding: 20px; margin-bottom: 16px; border-left: 4px solid #00b3b3;
    }
    .test-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 14px; }
    .test-card h5 { color: #003d3d; margin: 0; font-weight: 700; font-size: 1rem; }
    .test-card .test-type { font-size: 0.85rem; color: #666; margin-top: 2px; }
    .test-status { display: inline-block; padding: 3px 10px; border-radius: 8px; font-size: 0.75rem; font-weight: 600; }
    .test-status.prescribed { background: #fff3cd; color: #856404; }
    .test-status.pending { background: #cce5ff; color: #004085; }
    .test-status.completed { background: #d4edda; color: #155724; }

    .test-details {
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin: 14px 0;
    }
    .test-detail-item {
      padding: 10px; background: #f0f8f8; border-radius: 6px; border-left: 3px solid #00b3b3;
    }
    .test-detail-item strong { display: block; color: #003d3d; font-size: 0.85rem; margin-bottom: 3px; }
    .test-detail-item p { margin: 0; color: #555; font-size: 0.95rem; }

    .results-section {
      padding: 12px; background: #e8f5e9; border-left: 3px solid #4caf50; border-radius: 6px; margin: 12px 0;
    }
    .results-section strong { color: #2e7d32; display: block; margin-bottom: 8px; }
    .results-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .results-item { padding: 8px; background: #fff; border-radius: 4px; }
    .results-item small { display: block; color: #2e7d32; font-size: 0.8rem; font-weight: 600; margin-bottom: 3px; }
    .results-item p { margin: 0; color: #333; font-size: 0.9rem; }

    .no-tests {
      text-align: center; color: #888; padding: 48px 16px;
      font-style: italic; background: #fff; border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07); font-size: 0.95rem;
    }

    footer { background-color: #003d3d; color: #fff; text-align: center; padding: 18px; margin-top: 40px; }
  </style>
</head>
<body>

  <div id="navbar-root"></div>
  <script src="navbar.js"></script>

  <div class="page-header">
    <h1>Medical Tests</h1>
    <p>Track your prescribed tests and view results.</p>
  </div>

  <div class="main-wrap">
    <p class="sec-title"><i class="bi bi-flask me-2"></i>My Medical Tests</p>

    <!-- Filter buttons -->
    <div class="filter-bar">
      <button class="filter-btn active" onclick="filterByStatus('ALL')">All</button>
      <button class="filter-btn" onclick="filterByStatus('PRESCRIBED')">Prescribed</button>
      <button class="filter-btn" onclick="filterByStatus('PENDING')">Pending</button>
      <button class="filter-btn" onclick="filterByStatus('COMPLETED')">Completed</button>
    </div>

    <div id="testsContainer">
      <div class="no-tests">
        <i class="bi bi-beaker" style="font-size: 2.5rem; color: #bbb; display: block; margin-bottom: 10px;"></i>
        No tests found. Tests prescribed by your doctors will appear here.
      </div>
    </div>
  </div>

  <footer><p>© 2026 MediConnectX – Your Health, Our Priority</p></footer>

  <script src="api.js"></script>
  <script src="customModal.js"></script>
  <script>
    const auth = requireAuth('PATIENT');
    let allTests = [];
    let currentFilter = 'ALL';

    async function loadTests() {
      try {
        const response = await fetch(`http://localhost:8080/api/tests/patient/${auth.roleId}`, {
          headers: authHeaders()
        });

        if (!response.ok) {
          console.error('API Error:', response.status, response.statusText);
          if (response.status === 401) {
            showAlert('Error', 'Unauthorized - Please login again');
            window.location.href = 'Login.html';
            return;
          }
          throw new Error(`API Error: ${response.status}`);
        }

        allTests = await response.json() || [];
        renderTests();
      } catch (error) {
        console.error('Error loading tests:', error);
        showAlert('Error', `Failed to load medical tests: ${error.message}`);
      }
    }

    function renderTests() {
      let filtered = allTests;
      if (currentFilter !== 'ALL') {
        filtered = allTests.filter(t => t.status === currentFilter);
      }

      if (!filtered || filtered.length === 0) {
        document.getElementById('testsContainer').innerHTML = `
          <div class="no-tests">
            <i class="bi bi-beaker" style="font-size: 2.5rem; color: #bbb; display: block; margin-bottom: 10px;"></i>
            No tests found for this filter.
          </div>
        `;
        return;
      }

      const html = filtered.map(test => {
        const statusClass = test.status === 'PRESCRIBED' ? 'prescribed' : test.status === 'PENDING' ? 'pending' : 'completed';
        const prescribedDate = test.prescribedDate
          ? new Date(test.prescribedDate).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' })
          : 'N/A';

        return `
          <div class="test-card">
            <div class="test-header">
              <div>
                <h5>${test.testName || 'Medical Test'}</h5>
                <div class="test-type">${test.testType || 'N/A'}</div>
              </div>
              <span class="test-status ${statusClass}">${test.status}</span>
            </div>

            <div class="test-details">
              <div class="test-detail-item">
                <strong><i class="bi bi-calendar3"></i> Prescribed Date</strong>
                <p>${prescribedDate}</p>
              </div>
              <div class="test-detail-item">
                <strong><i class="bi bi-beaker"></i> Test Type</strong>
                <p>${test.testType || 'N/A'}</p>
              </div>
            </div>

            ${test.testDescription ? `
              <div style="padding: 10px; background: #f0f8f8; border-radius: 6px; border-left: 3px solid #00b3b3; margin: 12px 0;">
                <strong style="color: #003d3d; display: block; margin-bottom: 4px;">Description</strong>
                <p style="margin: 0; color: #555; font-size: 0.95rem;">${test.testDescription}</p>
              </div>
            ` : ''}

            ${test.status === 'COMPLETED' ? `
              <div class="results-section">
                <strong><i class="bi bi-graph-up"></i> Test Results</strong>
                <div class="results-row">
                  <div class="results-item">
                    <small>Results</small>
                    <p>${test.results || 'Awaiting results'}</p>
                  </div>
                  <div class="results-item">
                    <small>Normal Range</small>
                    <p>${test.normalRange || 'N/A'}</p>
                  </div>
                </div>
              </div>
            ` : ''}

            <div style="font-size: 0.8rem; color: #999; margin-top: 12px;">
              Created: ${new Date(test.createdAt).toLocaleString('en-IN')}
            </div>
          </div>
        `;
      }).join('');

      document.getElementById('testsContainer').innerHTML = html;
    }

    function filterByStatus(status) {
      currentFilter = status;
      document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      renderTests();
    }

    document.addEventListener('DOMContentLoaded', loadTests);
  </script>
</body>
</html>
