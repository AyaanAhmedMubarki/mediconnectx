<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline Consultations – MediConnectX Admin</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { font-family: "Segoe UI", sans-serif; margin: 0; background-color: #f4f9f9; color: #333; }

    .page-header {
      background: linear-gradient(to right, rgba(17,17,17,0.85), rgba(17,17,17,0.85)),
        url("images/MainPageImage.jpg") center/cover;
      color: white; text-align: center; padding: 50px 20px;
    }
    .page-header h1 { font-size: 2.4rem; font-weight: 700; margin-bottom: 10px; }
    .page-header p { font-size: 1.05rem; font-weight: 300; }

    .main-wrap { max-width: 1200px; margin: 0 auto; padding: 28px 16px 60px; }

    .sec-title { font-size: 1.25rem; font-weight: 700; color: #111; margin-bottom: 18px; border-left: 4px solid #666; padding-left: 12px; }

    /* ── Filter bar ── */
    .filter-bar {
      background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,0.09);
      padding: 16px 20px; display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 14px; margin-bottom: 24px;
    }
    @media(max-width:768px){ .filter-bar { grid-template-columns: 1fr; } }
    .filter-bar label { display: block; font-size: 0.78rem; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 6px; }
    .filter-bar select,
    .filter-bar input[type="date"] {
      width: 100%; padding: 10px 13px; border: 1.5px solid #c8e8e8;
      border-radius: 8px; font-size: 0.95rem; background: #f9fefe; color: #222;
      outline: none; transition: border-color 0.2s;
    }
    .filter-bar select:focus,
    .filter-bar input[type="date"]:focus { border-color: #666; box-shadow: 0 0 0 3px rgba(0,0,0,0.08); }

    /* ── Table styles ── */
    .table-card { background: #fff; border-radius: 12px; box-shadow: 0 4px 14px rgba(0,0,0,0.1); overflow: hidden; }
    .table-card-head {
      background: #333; color: #fff; padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .table-card-head h5 { margin: 0; font-weight: 700; font-size: 1rem; }
    .badge-booked { background:#27ae60; color:#fff; padding:3px 10px; border-radius:10px; font-size:.78rem; }
    .table-card table { width: 100%; border-collapse: collapse; }
    .table-card table thead { background: #f5fafa; }
    .table-card table thead th { padding: 12px 16px; font-weight: 700; color: #111; font-size: 0.9rem; border-bottom: 1.5px solid #d0e8e8; }
    .table-card table tbody td { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; font-size: 0.95rem; }
    .table-card table tbody tr:hover { background: #f9fefe; }

    footer { background-color: #111; color: #fff; text-align: center; padding: 18px; margin-top: 40px; }
  </style>
</head>
<body>

  <div id="navbar-root"></div>
  <script src="navbar.js"></script>

  <div class="page-header">
    <h1>Offline Consultation Overview</h1>
    <p>Monitor and manage all offline clinic consultations.</p>
  </div>

  <div class="main-wrap">

    <p class="sec-title"><i class="bi bi-hospital me-2"></i>All Offline Consultations</p>

    <!-- Filter -->
    <div class="filter-bar">
      <div>
        <label for="filterStatus">Filter by Status</label>
        <select id="filterStatus">
          <option value="">— All Status —</option>
          <option value="BOOKED">Booked (Upcoming)</option>
          <option value="COMPLETED">Completed (Past)</option>
          <option value="OPEN">Open (Available)</option>
        </select>
      </div>
      <div>
        <label for="filterDoctor">Filter by Doctor</label>
        <select id="filterDoctor">
          <option value="">— All Doctors —</option>
        </select>
      </div>
      <div>
        <label for="filterDate">Filter by Date</label>
        <input type="date" id="filterDate" />
      </div>
    </div>

    <div class="table-card">
      <div class="table-card-head">
        <h5><i class="bi bi-calendar2-check"></i> Consultation Records</h5>
        <span id="consultCount" class="badge bg-secondary">—</span>
      </div>
      <div id="consultWrap">
        <div class="text-muted p-4 text-center">Loading offline consultations…</div>
      </div>
    </div>

  </div>

  <footer><p>© 2026 MediConnectX – Smart Medical Management System. All Rights Reserved.</p></footer>

  <script src="api.js"></script>
  <script src="customModal.js"></script>
  <script>
    const auth = requireAuth('ADMIN');

    let allConsultations = [];
    let allDoctors = [];

    async function loadAllConsultations() {
      try {
        // Fetch all offline slots
        const response = await fetch('http://localhost:8080/api/offline-slots', {
          headers: authHeaders()
        });

        if (!response.ok) {
          // Fallback: try to get recent slots by date
          allConsultations = [];
          renderConsultations(allConsultations);
          return;
        }

        allConsultations = await response.json();
        renderConsultations(allConsultations);
      } catch (err) {
        document.getElementById('consultWrap').innerHTML =
          `<div class="text-muted p-4 text-center">Could not load consultations</div>`;
      }
    }

    async function loadDoctors() {
      try {
        const response = await fetch('http://localhost:8080/api/doctor', {
          headers: authHeaders()
        });

        if (!response.ok) throw new Error('Failed to load doctors');

        allDoctors = await response.json();
        populateDoctorFilter();
      } catch (err) {
        console.error('Failed to load doctors:', err);
      }
    }

    function populateDoctorFilter() {
      const sel = document.getElementById('filterDoctor');
      sel.innerHTML = '<option value="">— All Doctors —</option>';
      allDoctors.forEach(d => {
        const opt = document.createElement('option');
        opt.value = d.id;
        opt.textContent = `Dr. ${d.name}`;
        sel.appendChild(opt);
      });
    }

    document.getElementById('filterStatus').addEventListener('change', applyFilters);
    document.getElementById('filterDoctor').addEventListener('change', applyFilters);
    document.getElementById('filterDate').addEventListener('change', applyFilters);

    function applyFilters() {
      const statusFilter = document.getElementById('filterStatus').value;
      const doctorFilter = document.getElementById('filterDoctor').value;
      const dateFilter = document.getElementById('filterDate').value;

      const now = new Date();
      let filtered = allConsultations;

      if (statusFilter) {
        if (statusFilter === 'BOOKED') {
          // Show booked slots that have NOT ended yet
          filtered = filtered.filter(c => {
            if (c.status !== 'BOOKED') return false;
            const slotEndDateTime = new Date(c.slotDate + 'T' + c.endTime);
            return slotEndDateTime > now;
          });
        } else if (statusFilter === 'COMPLETED') {
          // Show booked slots that have ended
          filtered = filtered.filter(c => {
            if (c.status !== 'BOOKED') return false;
            const slotEndDateTime = new Date(c.slotDate + 'T' + c.endTime);
            return slotEndDateTime <= now;
          });
        } else if (statusFilter === 'OPEN') {
          // Show open slots
          filtered = filtered.filter(c => c.status === 'OPEN');
        }
      }

      if (doctorFilter) {
        filtered = filtered.filter(c => c.doctor?.id == doctorFilter);
      }

      if (dateFilter) {
        filtered = filtered.filter(c => c.slotDate === dateFilter);
      }

      renderConsultations(filtered);
    }

    function renderConsultations(consultations) {
      const wrap = document.getElementById('consultWrap');
      const countEl = document.getElementById('consultCount');

      if (!consultations || consultations.length === 0) {
        wrap.innerHTML = '<div class="text-muted p-4 text-center">No offline consultations found.</div>';
        countEl.textContent = '0';
        return;
      }

      countEl.textContent = consultations.length;

      const tableRows = consultations.map(slot => {
        const docName = slot.doctor?.name || '—';
        const patientName = slot.patient?.name || '—';
        const clinicName = slot.location?.clinicName || '—';
        const slotDate = new Date(slot.slotDate);
        const slotDateStr = slotDate.toLocaleDateString('en-IN', {
          day: 'numeric', month: 'short', year: 'numeric'
        });
        const startTime = (slot.startTime || '').substring(0, 5);
        const endTime = (slot.endTime || '').substring(0, 5);

        let statusBadge;
        if (slot.status === 'BOOKED') {
          const slotEndDateTime = new Date(slot.slotDate + 'T' + slot.endTime);
          const now = new Date();
          if (slotEndDateTime <= now) {
            statusBadge = '<span style="background:#2980b9;color:#fff;padding:3px 10px;border-radius:10px;font-size:.78rem;">Completed</span>';
          } else {
            statusBadge = '<span class="badge-booked">Booked</span>';
          }
        } else {
          statusBadge = '<span style="background:#95a5a6;color:#fff;padding:3px 10px;border-radius:10px;font-size:.78rem;">Open</span>';
        }

        return `<tr>
          <td><strong>Dr. ${docName}</strong></td>
          <td>${patientName}</td>
          <td>${slotDateStr}</td>
          <td>${startTime} – ${endTime}</td>
          <td>${clinicName}</td>
          <td>${statusBadge}</td>
        </tr>`;
      }).join('');

      wrap.innerHTML = `
        <table>
          <thead>
            <tr>
              <th style="width: 18%;">Doctor</th>
              <th style="width: 18%;">Patient</th>
              <th style="width: 16%;">Date</th>
              <th style="width: 14%;">Time</th>
              <th style="width: 20%;">Clinic</th>
              <th style="width: 14%;">Status</th>
            </tr>
          </thead>
          <tbody>
            ${tableRows}
          </tbody>
        </table>`;
    }

    loadDoctors();
    loadAllConsultations();
  </script>

</body>
</html>
