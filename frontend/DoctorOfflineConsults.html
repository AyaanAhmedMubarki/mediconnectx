<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline Consultations – MediConnectX Doctor</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { font-family: "Segoe UI", sans-serif; margin: 0; background-color: #f0f8ff; color: #333; }

    .page-header {
      background: linear-gradient(to right, rgba(0,85,128,0.85), rgba(0,40,80,0.85)),
        url("images/MainPageImage.jpg") center/cover;
      color: white; text-align: center; padding: 50px 20px;
    }
    .page-header h1 { font-size: 2.4rem; font-weight: 700; margin-bottom: 10px; }
    .page-header p { font-size: 1.05rem; font-weight: 300; }

    .main-wrap { max-width: 1100px; margin: 0 auto; padding: 28px 16px 60px; }

    .sec-title { font-size: 1.25rem; font-weight: 700; color: #005580; margin-bottom: 18px; border-left: 4px solid #0059a3; padding-left: 12px; }

    /* ── Table styles ── */
    .table-card { background: #fff; border-radius: 12px; box-shadow: 0 4px 14px rgba(0,0,0,0.1); overflow: hidden; }
    .table-card-head {
      background: #01486b; color: #fff; padding: 14px 20px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .table-card-head h5 { margin: 0; font-weight: 700; font-size: 1rem; }
    .badge-booked { background:#27ae60; color:#fff; padding:3px 10px; border-radius:10px; font-size:.78rem; }
    .table-card table { width: 100%; border-collapse: collapse; }
    .table-card table thead { background: #f5fafa; }
    .table-card table thead th { padding: 12px 16px; font-weight: 700; color: #005580; font-size: 0.9rem; border-bottom: 1.5px solid #d0e8e8; }
    .table-card table tbody td { padding: 12px 16px; border-bottom: 1px solid #f0f0f0; }
    .table-card table tbody tr:hover { background: #f9fefe; }

    footer { background-color: #012b40; color: #fff; text-align: center; padding: 18px; margin-top: 40px; }
  </style>
</head>
<body>

  <div id="navbar-root"></div>
  <script src="navbar.js"></script>

  <div class="page-header">
    <h1>My Offline Consultations</h1>
    <p>View all your scheduled offline clinic consultations.</p>
  </div>

  <div class="main-wrap">

    <!-- ── Offline Consultation Schedule ── -->
    <p class="sec-title"><i class="bi bi-hospital me-2"></i>Offline Consultation Schedule</p>

    <div class="table-card">
      <div class="table-card-head">
        <h5><i class="bi bi-calendar2-check"></i> Scheduled Consultations</h5>
        <span id="consultCount" class="badge bg-secondary">—</span>
      </div>
      <div id="consultWrap">
        <div class="text-muted p-4 text-center">Loading your offline consultations…</div>
      </div>
    </div>

  </div>

  <footer><p>© 2026 MediConnectX – Smart Medical Management System. All Rights Reserved.</p></footer>

  <script src="api.js"></script>
  <script src="customModal.js"></script>
  <script>
    const auth = requireAuth('DOCTOR');

    async function loadOfflineConsultations() {
      try {
        const response = await fetch(`http://localhost:8080/api/offline-slots/doctor/${auth.roleId}`, {
          headers: authHeaders()
        });

        if (!response.ok) throw new Error('Failed to load consultations');

        const allSlots = await response.json();
        const bookedSlots = allSlots.filter(slot => slot.status === 'BOOKED');

        renderConsultations(bookedSlots);
      } catch (err) {
        document.getElementById('consultWrap').innerHTML =
          `<div class="text-muted p-4 text-center">Could not load consultations</div>`;
      }
    }

    function renderConsultations(consultations) {
      const wrap = document.getElementById('consultWrap');
      const countEl = document.getElementById('consultCount');

      if (!consultations || consultations.length === 0) {
        wrap.innerHTML = '<div class="text-muted p-4 text-center">No offline consultations scheduled.</div>';
        countEl.textContent = '0';
        return;
      }

      countEl.textContent = consultations.length;

      const tableRows = consultations.map(slot => {
        const patientName = slot.patient?.name || '—';
        const clinicName = slot.location?.clinicName || 'Clinic';
        const address = [slot.location?.address, slot.location?.city].filter(Boolean).join(', ');
        const slotDate = new Date(slot.slotDate).toLocaleDateString('en-IN', {
          day: 'numeric', month: 'short', year: 'numeric'
        });
        const startTime = (slot.startTime || '').substring(0, 5);
        const endTime = (slot.endTime || '').substring(0, 5);

        const slotEndDateTime = new Date(slot.slotDate + 'T' + slot.endTime);
        const now = new Date();
        const isCompleted = slotEndDateTime <= now;
        const statusBadge = isCompleted
          ? '<span style="background:#2980b9;color:#fff;padding:3px 10px;border-radius:10px;font-size:.78rem;">Completed</span>'
          : '<span class="badge-booked">Booked</span>';

        return `<tr>
          <td><strong>${patientName}</strong></td>
          <td>${slotDate}</td>
          <td>${startTime} – ${endTime}</td>
          <td><strong>${clinicName}</strong><br/><span style="font-size:0.85rem;color:#666;">${address || '—'}</span></td>
          <td>${statusBadge}</td>
        </tr>`;
      }).join('');

      wrap.innerHTML = `
        <table>
          <thead>
            <tr>
              <th style="width: 25%;">Patient</th>
              <th style="width: 20%;">Date</th>
              <th style="width: 15%;">Time</th>
              <th style="width: 30%;">Location</th>
              <th style="width: 10%;">Status</th>
            </tr>
          </thead>
          <tbody>
            ${tableRows}
          </tbody>
        </table>`;
    }

    loadOfflineConsultations();
  </script>

</body>
</html>
