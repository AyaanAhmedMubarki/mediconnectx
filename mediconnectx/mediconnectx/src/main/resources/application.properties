spring.application.name=mediconnectx
server.port=8080

spring.jpa.hibernate.ddl-auto=update
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.url=jdbc:mysql://localhost:3306/MediConnectX?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
# JPA vendor adapter configuration
spring.jpa.show-sql=false
jwt.secret=${JWT_SECRET}
jwt.expiration=2592000000
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB


# SEC-02 fix: Never expose internal exception details to clients
server.error.include-message=never
server.error.include-exception=false
server.error.include-binding-errors=never


# ── Gmail SMTP (for Contact Form emails) ────────────────────────────────
# Use a Gmail App Password (NOT your regular password).
# Generate one at: Google Account → Security → 2-Step Verification → App Passwords
# App Password must be 16 characters with NO spaces (e.g. abcdabcdabcdabcd)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# ── Jitsi configuration
jitsi.app.id=mediconnectx-demo
jitsi.app.secret=${JITSI_APP_SECRET}
